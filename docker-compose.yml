# Trenvus Docker Compose Configuration
# 
# IMPORTANTE PARA WINDOWS:
# Se o backend entrar em loop por causa de JWT keys vazias,
# certifique-se de que o arquivo .env.backend existe com as chaves JWT.
#
# Para criar o .env.backend, execute:
#   ./fix-env-definitivo.sh  (Linux/Mac/Git Bash)
#   fix-env-definitivo.bat   (Windows CMD)
#
# Veja: FIX_ENV_DEFINITIVO.md para mais detalhes

services:
  db:
    image: postgres:16-alpine
    container_name: exchange-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exchange}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - exchange-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-exchange}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c maintenance_work_mem=32MB
      -c max_connections=20

  backend:
    build: .
    container_name: exchange-backend
    # USA ENV_FILE - Mais confiável para variáveis longas no Windows
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - exchange-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: exchange-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - exchange-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  pgdata:

networks:
  exchange-network:
    driver: bridge
