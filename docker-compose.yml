services:
  db:
    image: postgres:16-alpine
    container_name: exchange-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exchange}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Performance tuning para PostgreSQL em containers
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - exchange-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-exchange}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Adicionado comando para otimizar PostgreSQL
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c maintenance_work_mem=32MB
      -c max_connections=20

  backend:
    build: .
    container_name: exchange-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-exchange}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # JWT Keys
      JWT_PRIVATE_KEY_B64: ${JWT_PRIVATE_KEY_B64:-}
      JWT_PUBLIC_KEY_B64: ${JWT_PUBLIC_KEY_B64:-}
      JWT_ISSUER: ${JWT_ISSUER:-Trenvus}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      # CORS
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@trenvus.com}
      # URLs
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      # Mercado Pago
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY:-}
      MERCADOPAGO_RETURN_URL: ${MERCADOPAGO_RETURN_URL:-http://localhost:3000/mercadopago/return}
      # Test Accounts
      TEST_ACCOUNT_ENABLED: ${TEST_ACCOUNT_ENABLED:-true}
      TEST_ACCOUNTS: ${TEST_ACCOUNTS:-user1@test.com:123:USER;user2@test.com:123:USER;user3@test.com:123:USER}
      # Admin
      ADMIN_ACCOUNT_ENABLED: ${ADMIN_ACCOUNT_ENABLED:-true}
      ADMIN_LOGIN_ENABLED: ${ADMIN_LOGIN_ENABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@trenvus.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # JVM Options - podem ser sobrescritas pelo usuário
      JAVA_OPTS: ${JAVA_OPTS:--Xmx768m -Xms256m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom -Dspring.main.banner-mode=off}
      # Spring Boot otimizações
      SPRING_MAIN_BANNER_MODE: "off"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT: "INFO"
      LOGGING_LEVEL_TRENVUS_EXCHANGE: "DEBUG"
    ports:
      - "8080:8080"
    networks:
      - exchange-network
    # Alterado de 'always' para 'unless-stopped' para evitar loop infinito
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT:-1.5G}
        reservations:
          memory: 512M
    # Logs mais detalhados para debug
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: exchange-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - exchange-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  pgdata:

networks:
  exchange-network:
    driver: bridge
