services:
  db:
    image: postgres:16-alpine
    container_name: exchange-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exchange}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - exchange-network
    restart: always

  backend:
    build: .
    container_name: exchange-backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-exchange}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_PRIVATE_KEY_B64: ${JWT_PRIVATE_KEY_B64}
      JWT_PUBLIC_KEY_B64: ${JWT_PUBLIC_KEY_B64}
      APP_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://195.200.7.31:3000,http://195.200.7.31:5173"
      # SMTP Configuration
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: testguide047@gmail.com
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: noreply@trenvus.com
      APP_BASE_URL: ${APP_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      # Test accounts (from .env)
      TEST_ACCOUNT_ENABLED: "${TEST_ACCOUNT_ENABLED:-true}"
      TEST_ACCOUNTS: "${TEST_ACCOUNTS:-user1@test.com:123:USER;user2@test.com:123:USER;user3@test.com:123:USER}"
      # Admin account (from .env)
      ADMIN_ACCOUNT_ENABLED: "${ADMIN_ACCOUNT_ENABLED:-true}"
      ADMIN_LOGIN_ENABLED: "${ADMIN_LOGIN_ENABLED:-true}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@trenvus.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
    ports:
      - "8080:8080"
    networks:
      - exchange-network
    restart: always

  frontend:
    build: ./frontend
    container_name: exchange-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - exchange-network
    restart: always

volumes:
  pgdata:

networks:
  exchange-network:
    driver: bridge
