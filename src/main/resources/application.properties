spring.application.name=Trenvus

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/exchange}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Otimizado para containers
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA/Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Logging
logging.level.root=INFO
logging.level.trenvus.Exchange=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Server Configuration
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# JWT Configuration
jwt.issuer=${JWT_ISSUER:Trenvus}
jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:2592000}

# Mercado Pago Configuration
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public-key=${MERCADOPAGO_PUBLIC_KEY:}
mercadopago.return-url=${MERCADOPAGO_RETURN_URL:http://localhost:3000/mercadopago/return}

# SMTP Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application URLs
app.base-url=${APP_BASE_URL:http://localhost:3000}
api.base-url=${API_BASE_URL:http://localhost:8080}
app.cors-origins=${APP_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Test Accounts Configuration
test.account.enabled=${TEST_ACCOUNT_ENABLED:true}
test.accounts=${TEST_ACCOUNTS:user1@test.com:test123:USER;user2@test.com:test123:USER;user3@test.com:test123:USER}
test.account.email=${TEST_ACCOUNT_EMAIL:}
test.account.password=${TEST_ACCOUNT_PASSWORD:}

# Admin Configuration
admin.account.enabled=${ADMIN_ACCOUNT_ENABLED:true}
admin.login.enabled=${ADMIN_LOGIN_ENABLED:true}
admin.email=${ADMIN_EMAIL:admin@trenvus.com}
admin.password=${ADMIN_PASSWORD:admin123}

# Actuator Health Endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
